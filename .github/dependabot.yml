# (do not edit this line; the maintenance pipeline uses it for drift detection — see #213)
# Dependabot config — automated dependency updates.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      pip-minor-patch:
        update-types: ["minor", "patch"]

  # Tracks the FROM line(s) in your Dockerfile(s). Without this, a CVE in
  # `python:3.12-slim` or `node:20-alpine` lingers indefinitely because
  # nothing pulls the latest tag.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      docker-minor-patch:
        update-types: ["minor", "patch"]
