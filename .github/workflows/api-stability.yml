# API Stability — Python public-API breaking-change detector.
#
# Runs `griffe check` between the PR's merge-base and HEAD, then gates with
# a version-bump bypass: breaking changes are allowed when the PR also
# bumps `pyproject.toml [project].version`'s MAJOR component OR declares
# the break with `!` after the conventional-commit type in the title
# (`feat!:`, `fix!:`, etc.).
#
# The Claude Approver (when enabled via `--claude-approver true` at
# bootstrap time) reads `griffe-findings.json` from this workflow's
# artifact and applies per-PR-type criteria from
# `.claude/approver-policy.md` on top of this gate's binary verdict —
# e.g. `refactor:` PRs trigger REQUEST_CHANGES on any breaking change
# even when the gate let them through with a `!` declaration.
#
# Generated by `/development:bootstrap` when `pyproject.toml [project]`
# is present. The wrapper script (`.github/scripts/check-api-stability.py`)
# is also bootstrap-generated; see
# `development/skills/bootstrap/templates/languages/python/check-api-stability.py`
# in the plugin family.

name: API Stability

on:
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/scripts/check-api-stability.py"
      - ".github/workflows/api-stability.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-stability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-stability:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          # `griffe check -a/-b` needs both refs available; without
          # full history, the merge-base ref isn't fetched.
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install griffe + tomli
        run: |
          python -m pip install --upgrade pip
          pip install griffe tomli

      - name: Install package
        # Optional install — griffe resolves imports better when the
        # package itself is installed. Try [dev] first (dev dependencies
        # often include test-time imports the package references), then
        # bare install; if both fail, continue (the script will still
        # run on the source tree).
        run: |
          pip install -e ".[dev]" 2>/dev/null \
            || pip install -e . 2>/dev/null \
            || true

      - name: Run API stability check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python .github/scripts/check-api-stability.py \
            --old-ref "origin/main" \
            --new-ref "HEAD" \
            --pr-title "$PR_TITLE" \
            --output griffe-findings.json

      - name: Upload findings artifact
        # `if: always()` so the Approver can still read the report even
        # when the gate failed — that's the whole point of having two layers.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: api-stability-${{ github.event.pull_request.number || github.sha }}
          path: griffe-findings.json
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          if [ ! -f griffe-findings.json ]; then exit 0; fi
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          data = json.loads(pathlib.Path("griffe-findings.json").read_text())
          if data.get("skipped"):
              print("## API Stability — skipped")
              print()
              print(data.get("reason", ""))
              raise SystemExit
          print("## API Stability Report")
          print()
          print(f"- **Package:** `{data.get('package', '?')}`")
          print(f"- **Versions:** `{data.get('old_version', '?')}` → `{data.get('new_version', '?')}`")
          print(f"- **Major bumped:** {data.get('version_bumped', False)}")
          print(f"- **Title declares `!`:** {data.get('title_signal', False)}")
          findings = data.get("breaking_changes", [])
          print(f"- **Breaking changes:** {len(findings)}")
          if findings:
              print()
              print("### Findings")
              print()
              for f in findings[:20]:
                  kind = f.get("kind", "?")
                  path = f.get("path", "?")
                  detail = (f.get("detail", "?") or "")[:200]
                  print(f"- **{kind}** `{path}` — {detail}")
              if len(findings) > 20:
                  print()
                  print(f"… and {len(findings) - 20} more.")
          PY
