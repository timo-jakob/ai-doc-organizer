# (do not edit this line; the maintenance pipeline uses it for drift detection — see #213)
# CodeQL — GitHub-native SAST, free for public repos. The primary SAST
# signal consumed by /development:maintenance via the Code Scanning API.
# Sonar adds a second opinion. Snyk's GitHub App also posts a SAST PR
# check (advisory only — not gathered by the maintenance pipeline).

name: CodeQL

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC — drift detection
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Languages auto-filled by bootstrap. CodeQL supports:
        # cpp, csharp, go, java, javascript, python, ruby, swift
        language: [python]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/language:${{ matrix.language }}"
