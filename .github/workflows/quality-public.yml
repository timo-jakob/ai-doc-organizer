# Quality + security pipeline for PUBLIC repositories.
# Runs on github-hosted runners. Uses SonarCloud for static analysis +
# coverage and Snyk for security (code + open source + container).
#
# Image publishing: built image is scanned, then pushed to GitHub Container
# Registry (ghcr.io/<owner>/<repo>) on merge to main + release events. The
# scan gates the push — a vulnerable image never reaches the registry.

name: Quality (public)

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  release:
    types: [published]
  schedule:
    # Weekly Monday 06:00 UTC — drift detection against newly-disclosed CVEs
    # and updated license categorizations. Matches CodeQL's weekly cadence.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Least-privilege workflow defaults. The `image` job widens its own
# permissions for GHCR push + cosign keyless signing; nothing else
# needs anything beyond `contents: read`.
permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0   # SonarCloud needs full history for blame

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install system dependencies (OCR + PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-deu \
            tesseract-ocr-eng \
            poppler-utils

      - name: Install + test (Python)
        run: |
          [[ -f requirements.txt ]] && pip install -r requirements.txt
          pip install -e ".[dev]"
          pip install pytest-cov
          pytest --cov --cov-report=xml --cov-report=term

      # Local mirror of the diff-cover pre-push hook: enforce 90% coverage
      # on new lines vs origin/main. PR-only because there's no "new code"
      # diff to compute on push to the default branch. Uses the cobertura
      # coverage.xml produced above.
      - name: Install diff-cover (Python — coverage floor)
        if: github.event_name == 'pull_request'
        run: pip install 'diff-cover>=9'
      # BASE_REF is funnelled through `env:` rather than inlined into
      # `run:` to keep semgrep's run-shell-injection rule happy —
      # github-context values are untrusted input (a PR author can target
      # a maliciously-named base branch). Applies to both steps below.
      - name: Fetch base ref for diff-cover (Python)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --prune --depth=100 origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
      - name: Coverage floor — 90% on new code (Python)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          diff-cover coverage.xml \
            --compare-branch="origin/${BASE_REF}" \
            --fail-under=90 \
            --show-uncovered

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage.out
            coverage.lcov
            coverage/lcov.info
          if-no-files-found: ignore

  # --- SonarCloud -----------------------------------------------------------
  sonarcloud:
    needs: test-and-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - name: Download coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: coverage-reports
          path: .
        # No continue-on-error: if test-and-coverage didn't produce coverage,
        # Sonar should fail loudly rather than silently report green without it.
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995  # v8  # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # Snyk Code (SAST) + Snyk Open Source (deps) are scanned by Snyk's GitHub
  # integration directly — the App posts PR status checks without a CI job.
  # We don't run `snyk code test` / `snyk test` here because CLI-invoked
  # scans count as PRIVATE tests against the org's monthly quota regardless
  # of repo visibility. The container scan (further down) stays in CI: the
  # integration can't see an image that only exists after the build step.

  # --- License compliance (dependencies) ------------------------------------
  # Uses Trivy as an open-source license scanner. Catches deps shipping
  # incompatible licenses (AGPL/SSPL → HIGH severity, blocks CI by default).
  # Policy customizable via trivy.yaml.
  license-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "license"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "table"
          trivy-config: trivy.yaml

  # Container image pipeline.
  #
  # PRs                     → build linux/amd64 only, scan, no push (fast)
  # push to main / release  → build linux/amd64 + linux/arm64, scan, push to GHCR
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # ghcr.io push
      id-token: write    # cosign keyless OIDC signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build image (amd64 only, for scanning)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # mode=min on the PR build: only the final layer is cached, so a
          # malicious fork PR can't poison intermediate layer keys that a
          # later push from the trusted ref would consume. The push build
          # below uses mode=max because it's already gated to trusted events.
          cache-to: type=gha,mode=min

      - name: Pick a tag for scanning
        id: pick
        run: |
          tag=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Snyk container scan
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04  # v1.0.0
      - run: |
          # --policy-path makes Snyk read .snyk ignores for container scans
          # (it doesn't auto-discover the policy file in container mode).
          snyk container test "${{ steps.pick.outputs.tag }}" \
            --severity-threshold=high --file=Dockerfile --policy-path=.snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # License-image scan removed: Trivy's `restricted` classification
      # flags every Debian distro GPL/LGPL transitively included by tesseract,
      # poppler, etc. We use those packages via OS dynamic linking, not by
      # embedding them in a derivative, so copyleft obligations don't apply.
      # The license-fs job above covers what's actually relevant: our own
      # Python dependencies, declared in pyproject.toml + requirements.txt.

      - name: Login to GHCR
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image (with SBOM + provenance)
        id: build-push
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export SBOM as CI artifact
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ steps.pick.outputs.tag }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Validate SBOM is well-formed CycloneDX
        if: github.event_name == 'push' || github.event_name == 'release'
        run: |
          docker run --rm -v "$PWD:/work" cyclonedx/cyclonedx-cli:0.32.0 \
            validate --input-file /work/sbom.cdx.json --input-format json --fail-on-errors

      - name: Upload SBOM artifact
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

      - name: Install cosign
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image with cosign (keyless OIDC)
        if: github.event_name == 'push' || github.event_name == 'release'
        env:
          IMAGE_DIGEST: ${{ steps.build-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${IMAGE_DIGEST}"
          done

  # --- Semgrep (free OSS rules) ---------------------------------------------
  semgrep:
    runs-on: ubuntu-latest
    container:
      # Pinned; bump in lockstep with the semgrep entry in
      # .pre-commit-config.yaml so local + CI behave identically.
      image: returntocorp/semgrep:1.163.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - run: semgrep ci --config=auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}   # optional

  # --- Pre-commit (CI backstop) ---------------------------------------------
  # Catches contributors who bypassed local hooks with `git commit
  # --no-verify` or pushed from a machine without pre-commit installed.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
