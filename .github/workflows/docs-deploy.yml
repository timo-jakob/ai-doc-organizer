# claude-bootstrap: rendered from common/.github/workflows/docs-deploy.yml.tmpl @ v1.98.4 sha256:f7f04609a93ee08a92a751ac7ff8728d53e7acea6a0118a542db775a2b18ab3b
# (do not edit this line; the maintenance pipeline uses it for drift detection — see #213)
# Deploy the docs site to GitHub Pages — installed by /development:bootstrap
# (#766, epic #745).
#
# Runs ONLY on push to the default branch (never on PRs — the PR-time
# strict-build gate is docs.yml). Builds the MkDocs-Material site and publishes
# it to GitHub Pages. Path-conditional on the docs surface, per the
# app-vs-container check-separation policy. Requires the repo's Pages source to
# be "GitHub Actions" (Settings -> Pages, or
# `gh api repos/<owner>/<repo>/pages -X POST -f build_type=workflow`).

name: docs deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run so a live
# deploy always completes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install the docs toolchain
        run: pip install -r requirements-docs.txt

      - name: Build the site (strict — broken internal links fail the build)
        run: mkdocs build --strict

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
