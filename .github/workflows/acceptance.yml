# Acceptance tests — exercise the SHIPPED artifact through its real interface.
#
# Unit + integration tests plus a coverage number don't prove the *deployed
# build* works; this stage does — it runs the built artifact the way a user
# actually touches it. It is a normal CI check (not an Approver capability): the
# Approver later judges the evidence this stage produces, and the #232
# wait-for-CI gate picks the new `acceptance (<interface>)` check up
# automatically.
#
# The interface set is filled by /development:bootstrap from detect-stack.sh's
# `interfaces` detection (#242) — one matrix leg per detected interface, so the
# check appears as `acceptance (cli)`, `acceptance (web-ui)`, … A `library`
# project has no runtime interface and renders no acceptance workflow at all.
#
# SPINE (#697) + cli harness (#698): the reusable structure + report contract,
# with the cli leg now running tests/acceptance/cli/ against the built entry
# point (#698). Other interfaces stay a green-but-minimal skeleton until their
# harness ships (rest / web-ui with follow-up epic #704). The
# `acceptance-report-<interface>` artifact (JUnit XML) is the durable contract
# Epic B's Approver-consumption child reads.

name: acceptance

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    # One leg per interface detect-stack.sh found -> check `acceptance (<iface>)`.
    strategy:
      fail-fast: false
      matrix:
        interface: [cli, web-ui]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # --- cli harness (#698) --------------------------------------------------
      # v1's cli surface is Python (interface detection is Python-only, #242): the
      # "test system" is just the installed entry point — no service deploy — so
      # build the artifact by installing the package, then drive
      # tests/acceptance/cli/ against it. rest / web-ui deploy as long-running
      # services and set up their own tooling in their harness step (epic #704).
      - name: Set up Python
        if: matrix.interface == 'cli'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Build the cli artifact (install the package + pytest)
        if: matrix.interface == 'cli'
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || pip install .

      - name: Exercise the ${{ matrix.interface }} interface
        # cli (#698): run tests/acceptance/cli/ against the built entry point,
        # emitting JUnit into acceptance-report/ — a failing case fails the
        # `acceptance (cli)` check. Other interfaces are still the green-but-
        # minimal spine skeleton until their harness ships (epic #704).
        run: |
          set -euo pipefail
          iface="${{ matrix.interface }}"
          mkdir -p acceptance-report
          case "$iface" in
          cli)
            python -m pytest tests/acceptance/cli/ \
              --junitxml="acceptance-report/acceptance-cli.xml"
            ;;
          *)
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<testsuites>' \
              "  <testsuite name=\"acceptance-${iface}\" tests=\"1\" failures=\"0\" errors=\"0\">" \
              "    <testcase classname=\"acceptance.${iface}\" name=\"spine-skeleton-smoke\"/>" \
              '  </testsuite>' \
              '</testsuites>' \
              >"acceptance-report/acceptance-${iface}.xml"
            ;;
          esac

      - name: Upload acceptance-report
        # Always upload so the Approver-consumption child (#704) can read the
        # evidence even when the exercise failed — that is the point of the
        # report contract. The name is unique per matrix leg (upload-artifact v4+
        # rejects duplicate artifact names), and `acceptance-report-<interface>`
        # is the stable prefix consumers glob for.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: acceptance-report-${{ matrix.interface }}
          path: acceptance-report/
          retention-days: 30
